<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Camelot Condominiums Progress Tracker - Interactive Capital Improvement Plan mapping fences, landscaping, siding, chimneys, and roofs across phases.">
  <title>Camelot Condominiums | capital improvement plan tracker</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style_v5.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar: Controls & Details -->
    <aside class="sidebar">
      
      <!-- Header -->
      <header class="sidebar-header">
        <div class="logo-row">
          <i class="fa-solid fa-shield-halved logo-icon"></i>
          <h1 class="logo-text">Camelot</h1>
        </div>
        <p class="app-subtitle">Capital Improvement Plan & Property Progress Tracker</p>
      </header>

      <!-- Project Selection Tabs -->
      <section class="project-tabs-container">
        <span class="section-label"
          <!-- Dynamic polygons generated by app.js -->
        </svg>
      </div>

      <!-- Mouse Hover Tooltip -->
      <div class="map-tooltip" id="mapTooltip" role="tooltip"></div>

      <!-- Admin Coordinates Mapping Drawer -->
      <button class="mapper-toggle-btn" id="toggleMapper" aria-label="Toggle Coordinate Drawing Tool">
        <i class="fa-solid fa-compass-drafting"></i> Coordinate Mapper
      </button>
      
      <div class="mapper-drawer" id="mapperPanel" aria-hidden="true">
        <div class="mapper-header">
          <span class="mapper-title"><i class="fa-solid fa-vector-square"></i> SVG Point Editor</span>
          <p class="mapper-desc">Draw custom overlays on the map</p>
        </div>
        
        <div class="mapper-field">
          <label class="mapper-label" for="mapperBldgSelect">Target Building</label>
          <select class="mapper-select" id="mapperBldgSelect"></select>
        </div>

        <div class="mapper-field">
          <label class="mapper-label">Points Clicked</label>
          <div class="mapper-points-box" id="mapperPointsList"></div>
        </div>

        <div class="mapper-field">
          <label class="mapper-label" for="mapperCoordsText">Formatted SVG String</label>
          <textarea class="mapper-textarea" id="mapperCoordsText" readonly></textarea>
        </div>

        <div class="mapper-actions">
          <button class="mapper-btn secondary" id="mapperReset">Clear Points</button>
          <button class="mapper-btn primary" id="mapperCopy">Copy Points</button>
        </div>
      </div>

    </main>

  </div>

  <!-- JavaScript logic -->
  <script src="app_v5.js"></script>
</body>
</html>
